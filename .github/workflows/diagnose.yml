name: Diagnose App Runner DB Connection

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:491766120292:service/contemplation-flow/5b294ce6aeb54f53826ce2d6e8e33a17

jobs:
  diagnose:
    name: Check Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check App Runner environment variable names
        run: |
          echo "=== App Runner Service Configuration ==="
          aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --output json | python3 -c "
import json, sys
data = json.load(sys.stdin)
svc = data['Service']
config = svc.get('SourceConfiguration', {})
image_config = config.get('ImageRepository', {}).get('ImageConfiguration', {})
env_vars = image_config.get('RuntimeEnvironmentVariables', {})
print('=== Environment Variables Configured ===')
print(f'Count: {len(env_vars)}')
for k in sorted(env_vars.keys()):
    val = env_vars[k]
    # Mask the value but show first 6 chars
    masked = val[:6] + '...' if len(val) > 6 else '(short)'
    print(f'  {k} = {masked}')
print()
print('=== Instance Configuration ===')
inst = svc.get('InstanceConfiguration', {})
print(f'  CPU: {inst.get(\"Cpu\")}')
print(f'  Memory: {inst.get(\"Memory\")}')
print()
print('=== Service Status ===')
print(f'  Status: {svc.get(\"Status\")}')
print(f'  Updated: {svc.get(\"UpdatedAt\")}')
"

      - name: Test Supabase DB connectivity (from GitHub runner)
        run: |
          echo "=== Testing DB host reachability ==="
          # Get the DB URL from App Runner config
          DB_URL=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --output json | python3 -c "
import json, sys
data = json.load(sys.stdin)
env = data['Service']['SourceConfiguration']['ImageRepository']['ImageConfiguration']['RuntimeEnvironmentVariables']
print(env.get('ASAM_DB_URL', 'NOT_SET'))
")
          echo "DB URL prefix: ${DB_URL:0:30}..."

          # Extract host from URL
          DB_HOST=$(python3 -c "
from urllib.parse import urlparse
import sys
url = '${DB_URL}'
parsed = urlparse(url)
print(parsed.hostname or 'PARSE_FAILED')
")
          echo "DB Host: $DB_HOST"

          # Test connectivity
          if [ "$DB_HOST" != "NOT_SET" ] && [ "$DB_HOST" != "PARSE_FAILED" ]; then
            echo "Testing TCP connection to $DB_HOST:5432..."
            timeout 5 bash -c "echo > /dev/tcp/$DB_HOST/5432" 2>&1 && echo "PORT 5432 REACHABLE" || echo "PORT 5432 NOT REACHABLE"
            timeout 5 bash -c "echo > /dev/tcp/$DB_HOST/6543" 2>&1 && echo "PORT 6543 REACHABLE" || echo "PORT 6543 NOT REACHABLE"
          fi
